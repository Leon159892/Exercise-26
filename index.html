<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Styling Practice</title>
    <style>
        /* 容器：設定固定寬度，確保全螢幕時圖片不會暴衝放大 */
        .image-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px; 
            
            /* --- 新增的關鍵設定 --- */
            width: 850px;      /* 鎖定總寬度，數值可依你想要的視覺大小微調 */
            margin: 50px auto; /* 讓整個容器在畫面正中央 */
        }

        /* 1. 左側圖片：要求 radius 18px, width 33%, no distortion */
        .img-left {
            width: 33%;          /* 這裡的 33% 現在會是容器寬度 (850px) 的 33%，不會隨螢幕變大 */
            height: 300px;
            border-radius: 18px;
            object-fit: cover;   
        }

        /* 2. 中間圖片：要求 150px, border 150px */
        .img-center {
            width: 150px;
            height: 150px;
            border-radius: 150px;
            object-fit: cover;
            flex-shrink: 0;      /* 確保中間的圓形在空間擠壓時絕對不會縮水變形 */
        }

        /* 3. 右側圖片：要求 width 33%, height 300px, distortion */
        .img-right {
            width: 33%;          /* 同理，鎖死在容器寬度的 33% */
            height: 300px;
            /* 預設行為：不加 object-fit 產生變形 (distortion) */
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?w=500" alt="巴黎鐵塔-左" class="img-left">
        
        <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=300" alt="山脈-中" class="img-center">
        
        <img src="https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?w=500" alt="巴黎鐵塔-右" class="img-right">
    </div>

</body>
</html>
